name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
      # - name: Audit
      # run: pnpm audit
      - name: Run linters
        uses: wearerequired/lint-action@v2
        with:
          eslint: true
          prettier: true
          prettier_args: --config .prettierrc
          continue_on_error: false
      - name: Build Project
        run: pnpm build
      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3 # or specific "vX.X.X" version tag for this action
        with:
          path: build/
          name: github-pages

  build_and_push_docker:
    needs: [check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      chart-version: ${{ steps.helm_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./ci/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get Next Version
        id: semver
        uses: thenativeweb/get-next-version@2.7.1

      - name: Set version for Helm
        id: helm_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # For tags, use the tag name (strip 'v' prefix if present)
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # For PRs, use prerelease format with PR number
            VERSION="${{ steps.semver.outputs.version}}-rc.${{ github.event.pull_request.number }}.${{ github.sha }}"
          else
            VERSION="${{ steps.semver.outputs.version }}"
            fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Helm chart version: ${VERSION}"

      - name: Update Helm chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.helm_version.outputs.version }}/" ci/helm/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.helm_version.outputs.version }}\"/" ci/helm/Chart.yaml

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Package Helm chart
        run: |
          helm package ci/helm -d helm-charts/

      - name: Push Helm chart to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin
          helm push helm-charts/personal-website-${{ steps.helm_version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  push_to_pages:
    if: github.event_name == 'pull_request'
    needs: [check]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
        with:
          preview: true

  publish:
    if: github.ref_name == 'main' && github.ref_type == 'branch'
    needs: [check]
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v5
      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
      - name: create release
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: pnpm dlx semantic-release
